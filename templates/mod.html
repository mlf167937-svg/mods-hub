{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 40px auto; padding: 0 10px;">
    
    <a href="/" style="color: var(--neon-color); text-decoration: none; font-size: 14px; font-weight: 600; display: inline-block; margin-bottom: 20px;">
        ← Kembali ke Beranda
    </a>

    <div class="card" style="padding: 35px; border-radius: 24px; gap: 15px;">
        <div>
            <div style="display: flex; gap: 8px; margin-bottom: 5px;">
                <div class="badge" style="border-color: var(--neon-color); color: var(--neon-color); background: transparent;">
                    MINECRAFT {{ mod.category.upper() }}
                </div>
            </div>
            <h1 style="font-size: 28px; font-weight: 800; color: #ffffff; margin-bottom: 15px; line-height: 1.3;">
                📦 {{ mod.title }}
            </h1>
            <p style="color: #cbd5e1; font-size: 15px; line-height: 1.6; margin-bottom: 25px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03);">
                {{ mod.desc }}
            </p>
        </div>

        <div style="border-top: 1px solid rgba(255,255,255,0.08); padding-top: 20px; margin-bottom: 25px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px;">
                <span style="color: #64748b;">Ukuran File:</span>
                <span style="color: #f8fafc; font-weight: 600;">💾 {{ mod.size }}</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                <span style="color: #64748b;">Versi Game:</span>
                <span style="color: #f8fafc; font-weight: 600;">🎮 {{ mod.version }}</span>
            </div>
        </div>

        <a class="btn" href="/download/{{ mod.category }}/{{ mod.file }}" style="padding: 15px; font-size: 15px; box-shadow: 0 4px 15px var(--neon-glow);">
            ⬇️ Unduh Berkas Sekarang
        </a>
    </div>
</div>
{% endblock %}
