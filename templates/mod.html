{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 20px auto; padding: 24px;">
    <div style="margin-bottom: 12px;">
        <span class="badge" style="border-color: var(--neon-color); color: var(--neon-color); background: transparent;">
            {{ mod.category|upper }} EDITION
        </span>
    </div>
    
    <h1 style="font-size: 24px; color: #ffffff; font-weight: 800; margin-bottom: 8px;">{{ mod.title }}</h1>
    <p style="color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 24px;">{{ mod.desc }}</p>

    <div style="background: #1e293b; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;">
        <h3 style="font-size: 14px; color: #cbd5e1; margin-bottom: 12px; font-weight: 600;">📥 Pilih Versi & Platform</h3>
        
        <div style="margin-bottom: 12px;">
            <label style="font-size: 11px; color: #64748b; font-weight: 700; display: block; margin-bottom: 4px;">GAME VERSION</label>
            <select id="versionSelect" onchange="updateDownloadLink()" style="width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; outline: none;">
                {% for v in mod.available_versions %}
                <option value="{{ v }}">{{ v }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-bottom: 16px;">
            <label style="font-size: 11px; color: #64748b; font-weight: 700; display: block; margin-bottom: 4px;">MOD LOADER / PLATFORM</label>
            <select id="loaderSelect" onchange="updateDownloadLink()" style="width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; outline: none;">
                {% for l in mod.available_loaders %}
                <option value="{{ l }}">{{ l }}</option>
                {% endfor %}
            </select>
        </div>

        <p id="fileSizeInfo" style="font-size: 13px; color: #94a3b8; margin-bottom: 12px;">📦 Ukuran: Berhitung...</p>

        <a id="downloadBtn" class="btn" href="#" style="background: var(--neon-color); color: #0b0f19;">🚀 Download Selected File</a>
    </div>

    <a href="/" style="color: #64748b; font-size: 13px; text-decoration: none; display: inline-block; text-align: center; width: 100%;">⬅️ Kembali ke Beranda</a>
</div>

<script>
    // Memasukkan data file dari Python ke array JavaScript
    const filesData = [
        {% for file in mod.files %}
        {
            filename: "{{ file.filename }}",
            version: "{{ file.version }}",
            loader: "{{ file.loader }}",
            size: "{{ file.size }}"
        }{% if not loop.last %},{% endif %}
        {% endfor %}
    ];

    const category = "{{ mod.category }}";
    const modId = "{{ mod.id }}";

    function updateDownloadLink() {
        const selectedVersion = document.getElementById("versionSelect").value;
        const selectedLoader = document.getElementById("loaderSelect").value;
        const downloadBtn = document.getElementById("downloadBtn");
        const sizeInfo = document.getElementById("fileSizeInfo");

        // Cari file yang cocok dengan kombinasi dropdown
        const matchedFile = filesData.find(f => f.version === selectedVersion && f.loader === selectedLoader);

        if (matchedFile) {
            // Jika ada file yang cocok
            downloadBtn.href = `/download/${category}/${modId}/${matchedFile.filename}`;
            downloadBtn.innerHTML = `🚀 Download (${matchedFile.filename})`;
            downloadBtn.style.pointerEvents = "auto";
            downloadBtn.style.opacity = "1";
            downloadBtn.style.background = "var(--neon-color)";
            sizeInfo.innerHTML = `📦 Ukuran File: <strong>${matchedFile.size}</strong>`;
        } else {
            // Jika kombinasi versi + loader tersebut tidak ada filenya
            downloadBtn.href = "#";
            downloadBtn.innerHTML = "❌ Tidak Tersedia untuk Kombinasi Ini";
            downloadBtn.style.pointerEvents = "none"; // Matikan tombol klik
            downloadBtn.style.opacity = "0.5";
            downloadBtn.style.background = "#ef4444"; // Ubah warna jadi merah tanda eror
            sizeInfo.innerHTML = `📦 Ukuran File: <strong>Tidak ada berkas</strong>`;
        }
    }

    // Jalankan fungsinya sekali di awal biar langsung mendeteksi saat halaman dibuka pertama kali
    document.addEventListener("DOMContentLoaded", updateDownloadLink);
</script>
{% endblock %}
