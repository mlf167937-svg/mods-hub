{% extends "base.html" %}
{% block content %}
<style>
    .upload-container { max-width: 700px; margin: 0 auto; background: var(--bg-card); padding: 40px; border-radius: 12px; border: 1px solid var(--border); }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #fff; }
    input, select, textarea { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-main); color: #fff; outline: none; font-size: 15px; transition: 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: var(--theme-color); background: #0b0c10; }
    .btn-submit { background: var(--theme-color); color: #000; font-weight: 800; font-size: 16px; border: none; padding: 16px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: 0.2s; }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
</style>
<div class="upload-container">
    <h2 style="margin-bottom: 25px; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
        <i class="fas fa-cloud-upload-alt" style="color: var(--theme-color); margin-right: 10px;"></i> Distribusi Berkas Versi
    </h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Judul Modifikasi</label>
            <input type="text" name="title" placeholder="Gunakan judul yang SAMA untuk menambah versi baru" required>
        </div>
        <div class="form-group">
            <label>Deskripsi Mod</label>
            <textarea name="desc" rows="4" placeholder="Tuliskan detail fitur mod..." required></textarea>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>Platform Target</label>
                <select name="platform">
                    <option value="java">Java Edition</option>
                    <option value="mcpe">MCPE / Bedrock</option>
                </select>
            </div>
            <div class="form-group">
                <label>Kategori Utama</label>
                <select name="category">
                    <option value="optimization">Optimization</option>
                    <option value="utility">Utility</option>
                    <option value="content">Content Pack</option>
                    <option value="shader">Shader / Visual</option>
                </select>
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>Mesin Loader</label>
                <input type="text" name="loader" placeholder="Contoh: Fabric, Forge, Addon" required>
            </div>
            <div class="form-group">
                <label>Versi Spesifik Game</label>
                <input type="text" name="game_version" placeholder="Contoh: 1.21.4 atau 1.21.5" required>
            </div>
        </div>

        <div style="background: rgba(255,255,255,0.02); border: 1px dashed var(--border); padding: 20px; border-radius: 8px; margin-bottom: 20px;">
            <div class="form-group">
                <label><i class="fas fa-image" style="color: var(--theme-color);"></i> Ikon Gambar (icon.jpg)</label>
                <input type="file" name="icon" accept="image/*" required style="padding: 10px; background: none; border: none;">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label><i class="fas fa-file-archive" style="color: var(--theme-color);"></i> Berkas File Game (Sertakan versi di nama file, ex: mod_v1.21.4.jar)</label>
                <input type="file" name="file" required style="padding: 10px; background: none; border: none;">
            </div>
        </div>
        
        <button type="submit" class="btn-submit"><i class="fas fa-plus"></i> Masukkan ke Folder Repositori</button>
    </form>
</div>
{% endblock %}
