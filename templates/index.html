{% extends "base.html" %}
{% block content %}
<style>
    /* Hero Banner */
    .hero { position: relative; width: 100%; height: 250px; border-radius: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; border: 1px solid var(--border); }
    .hero img { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.4; }
    .hero-content { position: relative; z-index: 2; text-align: center; }
    .hero-content h1 { font-size: 36px; font-weight: 800; text-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 20px; }
    
    /* Search & Filter */
    .search-box { width: 100%; max-width: 600px; padding: 15px 25px; border-radius: 30px; border: 2px solid var(--border); background: var(--bg-card); color: #fff; font-size: 16px; outline: none; margin-bottom: 20px; }
    .search-box:focus { border-color: var(--theme-color); }
    
    .filters { display: flex; gap: 10px; justify-content: center; margin-bottom: 40px; }
    .filter-btn { padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-muted); cursor: pointer; font-weight: 600; }
    .filter-btn.active { background: var(--theme-color); color: #000; border-color: var(--theme-color); }

    /* Modrinth Style Grid */
    .mod-grid { display: flex; flex-direction: column; gap: 15px; }
    .mod-card { display: flex; gap: 20px; background: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; text-decoration: none; color: inherit; transition: 0.2s; }
    .mod-card:hover { border-color: var(--theme-color); transform: translateY(-2px); }
    .mod-icon { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; background: var(--bg-main); }
    .mod-info { flex: 1; }
    .mod-title { font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 5px; }
    .mod-desc { color: var(--text-muted); font-size: 14px; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-align: justify; }
    .mod-tags { display: flex; gap: 10px; font-size: 12px; font-weight: 600; }
    .tag { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 6px; }
    .tag.platform { color: var(--theme-color); background: rgba(0, 175, 156, 0.1); }
</style>

<div class="hero">
    <img src="/static/img/banner.jpg" onerror="this.style.display='none'">
    <div class="hero-content">
        <h1>Mods modifed RexCraft</h1>
        <input type="text" class="search-box" id="search" placeholder="Cari mods akurat..." onkeyup="filterMods()">
    </div>
</div>

<div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">Semua</button>
    <button class="filter-btn" onclick="setFilter('java', this)">Java Edition</button>
    <button class="filter-btn" onclick="setFilter('mcpe', this)">MCPE / Bedrock</button>
</div>

<div class="mod-grid" id="modGrid">
    {% for mod in mods %}
    <a href="/mod/{{ mod.id }}" class="mod-card" data-platform="{{ mod.platform }}" data-title="{{ mod.title|lower }}">
        <img src="/static/uploads/{{ mod.platform }}/{{ mod.id }}/{{ mod.icon_filename }}" class="mod-icon">
        <div class="mod-info">
            <div style="display: flex; justify-content: space-between;">
                <div class="mod-title">{{ mod.title }}</div>
                <div style="color: var(--text-muted); font-size: 14px;"><i class="fas fa-download"></i> {{ mod.downloads }}</div>
            </div>
            <div class="mod-desc">{{ mod.desc }}</div>
            <div class="mod-tags">
                <span class="tag platform">{{ mod.platform|upper }}</span>
                <span class="tag">{{ mod.loader }}</span>
                <span class="tag">{{ mod.version }}</span>
            </div>
        </div>
    </a>
    {% endfor %}
</div>

<script>
    let currentFilter = 'all';
    function setFilter(platform, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = platform;
        filterMods();
    }
    function filterMods() {
        const query = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.mod-card').forEach(card => {
            const platform = card.getAttribute('data-platform');
            const title = card.getAttribute('data-title');
            const matchPlatform = (currentFilter === 'all' || platform === currentFilter);
            const matchSearch = title.includes(query);
            card.style.display = (matchPlatform && matchSearch) ? 'flex' : 'none';
        });
    }
</script>
{% endblock %}
