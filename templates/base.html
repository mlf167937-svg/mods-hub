<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RexCraftHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-source-sans-pro/3.0.0/system.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b0d12;
            --bg-card: #131722;
            --border: #222834;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --current-accent: #22c55e; /* Default Ijo Minecraft */
        }
        
        body.theme-blue { --current-accent: #3b82f6; }
        body.theme-purple { --current-accent: #a855f7; }
        body.theme-green { --current-accent: #22c55e; }

        body {
            background-color: var(--bg-main); color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; padding-top: 65px;
        }

        /* HEADER */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(19, 23, 34, 0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between; padding: 0 16px;
            box-sizing: border-box; z-index: 999;
        }

        .left-header { display: flex; align-items: center; gap: 14px; }
        .menu-toggle { font-size: 20px; color: #fff; cursor: pointer; background: none; border: none; }
        .logo-text { font-size: 19px; font-weight: 900; color: #fff; text-decoration: none; }
        .logo-text span { color: var(--current-accent); transition: 0.3s; }

        /* SIDEBAR / DRAWER */
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000;
        }
        .sidebar-overlay.open { opacity: 1; pointer-events: auto; }

        .sidebar-drawer {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #0f121a; border-right: 1px solid var(--border);
            box-sizing: border-box; padding: 24px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1001; display: flex; flex-direction: column; gap: 24px;
            overflow-y: auto;
        }
        .sidebar-drawer.open { left: 0; }

        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: -10px; }
        .drawer-header h2 { font-size: 20px; font-weight: 800; margin: 0; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; }

        .section-menu { display: flex; flex-direction: column; gap: 10px; }
        .section-title { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }

        /* FIX: Menambahkan margin bawah yang cukup agar opsi palet warna tidak menabrak judul teks */
        .color-palette { display: flex; gap: 12px; margin-bottom: 15px; margin-top: 5px; }
        .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.green { background: #22c55e; }
        .color-dot.blue { background: #3b82f6; }
        .color-dot.purple { background: #a855f7; }
        .color-dot.active { border-color: #fff; transform: scale(1.1); }

        .menu-link {
            display: flex; align-items: center; gap: 12px; color: #cbd5e1;
            text-decoration: none; font-size: 14px; font-weight: 700;
            padding: 10px 14px; border-radius: 10px; transition: 0.2s;
            border: 1px solid transparent;
        }
        .menu-link:hover { background: rgba(255,255,255,0.03); color: #fff; border-color: var(--border); }
        .menu-link i { font-size: 15px; color: var(--current-accent); width: 20px; text-align: center; }

        .gametag-box {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px; font-size: 13px; display: flex;
            flex-direction: column; gap: 8px;
        }
        .tag-row { display: flex; justify-content: space-between; font-weight: 600; }
        .tag-row span:first-child { color: var(--text-muted); }
        .tag-row span:last-child { color: #fff; font-family: monospace; }

        .main-wrapper { max-width: 600px; margin: 0 auto; padding: 16px; box-sizing: border-box; }
    </style>
</head>
<body class="theme-green">

    <header>
        <div class="left-header">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <a href="/" class="logo-text">RexCraft<span>Hub</span></a>
        </div>
        <a href="/community" style="color:#fff; font-size:18px;"><i class="fas fa-users-cog"></i></a>
    </header>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    
    <div class="sidebar-drawer" id="drawer">
        <div class="drawer-header">
            <h2>Pengaturan</h2>
            <button class="close-btn" onclick="toggleSidebar()">&times;</button>
        </div>

        <div class="section-menu">
            <div class="section-title">Tema Warna</div>
            <div class="color-palette">
                <div class="color-dot green active" onclick="setTheme('green')"></div>
                <div class="color-dot blue" onclick="setTheme('blue')"></div>
                <div class="color-dot purple" onclick="setTheme('purple')"></div>
            </div>
        </div>

        <div class="section-menu">
            <div class="section-title">Menu Utama</div>
            <a href="/ai" class="menu-link"><i class="fas fa-robot"></i> RexAI Q&A</a>
            <a href="/tutorial" class="menu-link"><i class="fas fa-book"></i> Tutorial Pemasangan</a>
            <a href="/community" class="menu-link"><i class="fas fa-comments"></i> Komunitas Post</a>
        </div>

        <div class="section-menu">
            <div class="section-title">Gamertag Minecraft</div>
            <div class="gametag-box">
                <div class="tag-row"><span>Java</span><span>RexCraft</span></div>
                <div class="tag-row"><span>Bedrock</span><span>RexCraft6506</span></div>
            </div>
        </div>

        <div class="section-menu">
            <div class="section-title">Media Sosial</div>
            <a href="https://youtube.com" target="_blank" class="menu-link"><i class="fab fa-youtube"></i> YouTube</a>
            <a href="https://tiktok.com" target="_blank" class="menu-link"><i class="fab fa-tiktok"></i> TikTok</a>
        </div>
    </div>

    <div class="main-wrapper">
        {% block content %}{% endblock %}
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('overlay').classList.toggle('open');
            document.getElementById('drawer').classList.toggle('open');
        }
        function setTheme(color) {
            document.body.className = '';
            document.body.classList.add('theme-' + color);
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            document.querySelector('.color-dot.' + color).classList.add('active');
            localStorage.setItem('rex-theme', color);
        }
        // Load preference theme saved
        const savedTheme = localStorage.getItem('rex-theme');
        if(savedTheme) { setTheme(savedTheme); }
    </script>
</body>
</html>
