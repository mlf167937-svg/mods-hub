<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else 'RexCraft Mods' }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Perbaikan Sistem Warna Tema */
        :root {
            --neon-color: #22c55e;
            --neon-glow: rgba(34, 197, 94, 0.25);
        }

        [data-theme="cyberpunk"] {
            --neon-color: #a855f7;
            --neon-glow: rgba(168, 85, 247, 0.25);
        }

        [data-theme="aurora"] {
            --neon-color: #06b6d4;
            --neon-glow: rgba(6, 182, 212, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Perbaikan: Menggunakan warna dasar hitam-biru gelap yang solid agar tidak bug hitam pekat */
        body {
            background-color: #0b0f19;
            color: #f8fafc;
            min-height: 100vh;
        }

        /* Navbar Ringkas & Pas */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: #111827;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        /* Tombol Pengaturan Ukuran Kecil Pas */
        .settings-container {
            position: relative;
        }

        .settings-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            border-color: var(--neon-color);
            color: white;
        }

        /* Menu Dropdown Ganti Warna */
        .settings-dropdown {
            display: none;
            position: absolute;
            top: 130%;
            left: 0;
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 130px;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .settings-dropdown.show {
            display: block;
        }

        .settings-dropdown h4 {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-align: center;
        }

        .theme-options {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .theme-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .theme-dot.active { border-color: white; }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--neon-color);
            text-shadow: 0 0 8px var(--neon-glow);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 30px 20px;
        }

        /* Hero Banner Utama */
        .hero-banner {
            position: relative;
            height: 280px;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: #111827;
        }

        .hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('/static/img/banner.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
            animation: bannerBerjalan 20s infinite alternate ease-in-out;
        }

        @keyframes bannerBerjalan {
            0% { transform: scale(1); }
            100% { transform: scale(1.08) translate(-4px, -4px); }
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(11, 15, 25, 0.4) 0%, #0b0f19 100%);
            z-index: 2;
        }

        .hero-content { position: relative; z-index: 3; max-width: 600px; }
        .hero-content h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .hero-content p { color: #94a3b8; font-size: 15px; }

        .search-wrapper { position: relative; max-width: 400px; margin: 15px auto 0 auto; }
        .search-input {
            width: 100%;
            padding: 10px 16px;
            background: #111827;
            border: 2px solid #1f2937;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .search-input:focus {
            border-color: var(--neon-color);
        }

        /* Perbaikan Total Struktur Kontainer Tombol Kategori */
        .filter-container {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .filter-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 22px;
            border-radius: 10px;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background: #374151;
            color: white;
        }

        /* Saat Aktif: Berwarna Penuh Mengikuti Tema Neon */
        .filter-btn.active {
            background: var(--neon-color);
            border-color: var(--neon-color);
            color: #0b0f19;
            box-shadow: 0 0 10px var(--neon-glow);
        }

        /* Grid & Kartu Mod */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2937;
            padding: 24px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card h2 { font-size: 20px; color: #ffffff; margin-bottom: 8px; }
        .card:hover h2 { color: var(--neon-color); }
        .card p { color: #94a3b8; font-size: 14px; line-height: 1.5; margin-bottom: 15px; }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            background: #1f2937;
            color: #cbd5e1;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 10px;
            background: var(--neon-color);
            text-decoration: none;
            color: #0b0f19;
            font-weight: 700;
            font-size: 14px;
            width: 100%;
        }

        .watermark {
            position: fixed;
            bottom: 15px;
            right: 20px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            background: #111827;
            padding: 4px 10px;
            border-radius: 6px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="nav">
    <div class="settings-container">
        <button class="settings-btn" onclick="toggleSettings()">⚙️ Tema</button>
        <div class="settings-dropdown" id="settingsDropdown">
            <h4>Pilih Warna</h4>
            <div class="theme-options">
                <div class="theme-dot active" style="background: #22c55e;" onclick="changeTheme('default', this)"></div>
                <div class="theme-dot" style="background: #a855f7;" onclick="changeTheme('cyberpunk', this)"></div>
                <div class="theme-dot" style="background: #06b6d4;" onclick="changeTheme('aurora', this)"></div>
            </div>
        </div>
    </div>

    <div class="logo">🟢 RexCraft Mods</div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

<div class="watermark">⚡ RexCraft Web</div>

<script>
function toggleSettings() {
    document.getElementById('settingsDropdown').classList.toggle('show');
}

window.onclick = function(event) {
    if (!event.target.matches('.settings-btn')) {
        let dropdowns = document.getElementsByClassName("settings-dropdown");
        for (let i = 0; i < dropdowns.length; i++) {
            let openDropdown = dropdowns[i];
            if (openDropdown.classList.contains('show')) {
                openDropdown.classList.remove('show');
            }
        }
    }
}

function changeTheme(themeName, element) {
    if(themeName === 'default') {
        document.documentElement.removeAttribute('data-theme');
    } else {
        document.documentElement.setAttribute('data-theme', themeName);
    }
    
    let dots = document.querySelectorAll('.theme-dot');
    dots.forEach(dot => dot.classList.remove('active'));
    element.classList.add('active');
}
</script>

</body>
</html>
