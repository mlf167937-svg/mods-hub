<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else 'RexCraft Mods' }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Default Tema Hijau */
        :root {
            --neon-color: #22c55e;
            --neon-glow: rgba(34, 197, 94, 0.3);
            --bg-gradient: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
        }

        /* Tema Ungu Cyberpunk */
        [data-theme="cyberpunk"] {
            --neon-color: #a855f7;
            --neon-glow: rgba(168, 85, 247, 0.3);
        }

        /* Tema Biru Aurora */
        [data-theme="aurora"] {
            --neon-color: #06b6d4;
            --neon-glow: rgba(6, 182, 212, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
        }

        /* Navbar Pas - Tidak Kegedean */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        /* Ukuran Tombol Pengaturan Diperkecil & Lebih Pas */
        .settings-container {
            position: relative;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            border-color: var(--neon-color);
            color: white;
        }

        /* Dropdown Ringkas Khusus Ganti Warna */
        .settings-dropdown {
            display: none;
            position: absolute;
            top: 130%;
            left: 0;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 140px;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .settings-dropdown.show {
            display: block;
        }

        .settings-dropdown h4 {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .theme-options {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .theme-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .theme-dot:hover { transform: scale(1.1); }
        .theme-dot.active { border-color: white; }

        .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--neon-color);
            text-shadow: 0 0 10px var(--neon-glow);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 30px 20px;
        }

        /* Hero Banner */
        .hero-banner {
            position: relative;
            height: 300px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .hero-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('/static/img/banner.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
            animation: bannerBerjalan 20s infinite alternate ease-in-out;
        }

        @keyframes bannerBerjalan {
            0% { transform: scale(1); }
            100% { transform: scale(1.1) translate(-5px, -5px); }
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(2, 6, 23, 0.3) 0%, rgba(2, 6, 23, 0.85) 100%);
            z-index: 2;
        }

        .hero-content { position: relative; z-index: 3; max-width: 600px; }
        .hero-content h1 {
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ffffff, var(--neon-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-content p { color: #94a3b8; font-size: 15px; }

        .search-wrapper { position: relative; max-width: 450px; margin: 20px auto 0 auto; }
        .search-input {
            width: 100%;
            padding: 12px 18px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        .search-input:focus {
            border-color: var(--neon-color);
            box-shadow: 0 0 10px var(--neon-glow);
        }

        /* 🛠️ REVISI TOMBOL FILTER: Bagus, Proporsional, Mengikuti Warna Tema */
        .filter-container {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .filter-btn {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 12px;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        /* Saat Aktif: Tombol Menyala Penuh Sesuai Tema */
        .filter-btn.active {
            background: var(--neon-color);
            border-color: var(--neon-color);
            color: #020617;
            box-shadow: 0 0 12px var(--neon-glow);
        }

        /* Grid Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--neon-color);
        }

        .card h2 { font-size: 20px; color: #ffffff; margin-bottom: 10px; }
        .card:hover h2 { color: var(--neon-color); }
        .card p { color: #94a3b8; font-size: 14px; line-height: 1.5; margin-bottom: 15px; }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 12px;
            background: var(--neon-color);
            text-decoration: none;
            color: #020617;
            font-weight: 700;
            font-size: 14px;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn:hover { transform: translateY(-1px); }

        .watermark {
            position: fixed;
            bottom: 15px;
            right: 20px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            background: rgba(15, 23, 42, 0.6);
            padding: 4px 10px;
            border-radius: 6px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="nav">
    <div class="settings-container">
