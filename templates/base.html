<!DOCTYPE html>
<html>
<head>

<title>{{ title if title else 'RexCraft Hub' }}</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:sans-serif;
background:
linear-gradient(135deg,#020617,#0f172a);
color:white;
min-height:100vh;
}

/* NAVBAR */

.nav{
display:flex;
justify-content:space-between;
align-items:center;

padding:18px 30px;

background:rgba(15,23,42,0.8);

backdrop-filter:blur(10px);

position:sticky;
top:0;

z-index:999;

border-bottom:
1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:24px;
font-weight:bold;
color:#22c55e;
}

.nav a{
text-decoration:none;
color:white;
margin-left:15px;

padding:10px 14px;

border-radius:12px;

transition:0.3s;
}

.nav a:hover{
background:#22c55e;
color:black;
}

/* CONTAINER */

.container{
max-width:1400px;
margin:auto;
padding:30px;
}

/* LAYOUT */

.layout{
display:flex;
gap:25px;
align-items:flex-start;
}

/* SIDEBAR */

.sidebar{
width:250px;

background:
rgba(15,23,42,0.9);

padding:20px;

border-radius:25px;

position:sticky;
top:100px;

box-shadow:
0 10px 25px rgba(0,0,0,0.4);
}

.sidebar h2{
margin-bottom:15px;
color:#22c55e;
font-size:18px;
}

.sidebar a{
display:block;

text-decoration:none;

color:#cbd5e1;

padding:10px 12px;

border-radius:12px;

margin-bottom:10px;

transition:0.3s;
}

.sidebar a:hover{
