<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else 'RexCraft Mods - Minecraft Hub' }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navbar dengan efek Glassmorphism yang tipis dan rapi */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            color: #22c55e;
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .nav a {
            text-decoration: none;
            color: #94a3b8;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav a:hover {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
        }

        /* Hero Banner Premium dengan Animasi Halus */
        .hero {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.12) 0%, rgba(15, 23, 42, 0.2) 100%);
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 70px 40px;
            text-align: center;
            border-radius: 32px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(34, 197, 94, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero h1 {
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #ffffff, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: #94a3b8;
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        /* Card Bergaya Cyberpunk & Efek Glow */
        .card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 24px;
            backdrop-filter: blur(8px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(30, 41, 59, 0.6);
            border-color: rgba(34, 197, 94, 0.4);
            box-shadow: 0 15px 35px rgba(34, 197, 94, 0.1);
        }

        .card h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffffff;
            transition: color 0.3s;
        }

        .card:hover h2 {
            color: #22c55e;
        }

        .card p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        /* Badge Versi Minecraft */
        .badge {
            align-self: flex-start;
            padding: 6px 14px;
            border-radius: 999px;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* Tombol Premium Modern */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            border-radius: 16px;
            background: #22c55e;
            text-decoration: none;
            color: #020617;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
        }

        .btn:hover {
            background: #16a34a;
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
            transform: translateY(-2px);
        }

        /* Styling Input Form Upload */
        input, textarea {
            width: 100%;
            padding: 16px;
            margin-top: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            background: #0f172a;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #22c55e;
            background: #1e293b;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
        }

        input[type="file"] {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            cursor: pointer;
            padding: 20px;
            text-align: center;
        }

        input[type="file"]:hover {
            border-color: #22c55e;
        }

        /* Watermark */
        .watermark {
            position: fixed;
            bottom: 15px;
            right: 20px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 13px;
            font-weight: 600;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.6);
            padding: 6px 12px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        /* Responsif untuk HP */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 36px;
            }
            .nav {
                padding: 20px;
                flex-direction: column;
                gap: 15px;
            }
            .nav-links {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="nav">
    <div class="logo">
        🟢 RexCraft Mods
    </div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/upload">Upload</a>
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

<div class="watermark">
    ⚡ Official RexCraft Web
</div>

</body>
</html>
