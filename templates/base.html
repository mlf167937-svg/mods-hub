<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else 'RexCraft Mods' }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Perbaikan Sistem Warna Tema */
        :root {
            --neon-color: #22c55e;
            --neon-glow: rgba(34, 197, 94, 0.25);
        }

        [data-theme="cyberpunk"] {
            --neon-color: #a855f7;
            --neon-glow: rgba(168, 85, 247, 0.25);
        }

        [data-theme="aurora"] {
            --neon-color: #06b6d4;
            --neon-glow: rgba(6, 182, 212, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #0b0f19;
            color: #f8fafc;
            min-height: 100vh;
        }

        /* Navbar Ringkas & Pas */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: #111827;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 999;
        }

        /* Tombol Settings yang Diubah Namanya */
        .settings-container {
            position: relative;
        }

        .settings-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .settings-btn:hover {
            border-color: var(--neon-color);
            color: white;
        }

        /* Dropdown Settings yang Diperluas Sesuai Request Bos */
        .settings-dropdown {
            display: none;
            position: absolute;
            top: 135%;
            left: 0;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 210px;
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        .settings-dropdown.show {
            display: block;
        }

        .settings-dropdown h4 {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        /* Bagian Ganti Warna */
        .theme-options {
            display: flex;
            gap: 10px;
            justify-content: flex-start;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .theme-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
        
        .theme-dot:hover { transform: scale(1.1); }
        .theme-dot.active { border-color: white; }

        /* Bagian List Gamertag Info */
        .gamertag-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .gamertag-item {
            background: rgba(31, 41, 55, 0.5);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .gamertag-label {
            color: #64748b;
            font-size: 10px;
            display: block;
            margin-bottom: 1px;
            font-weight: 600;
        }

        .gamertag-value {
            color: #e2e8f0;
            font-weight: 600;
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            color: var(--neon-color);
            text-shadow: 0 0 8px var(--neon-glow);
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 30px 20px;
        }

        .watermark {
            position: fixed;
            bottom: 15px;
            right: 20px;
            color: rgba(255, 255, 255, 0.15);
            font-size: 12px;
            background: #111827;
            padding: 4px 10px;
            border-radius: 6px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="nav">
    <div class="settings-container">
        <button class="settings-btn" onclick="toggleSettings()">⚙️ Settings</button>
        <div class="settings-dropdown" id="settingsDropdown">
            
            <h4>Pilihan Tema</h4>
            <div class="theme-options">
                <div class="theme-dot active" style="background: #22c55e;" onclick="changeTheme('default', this)" title="Hijau Default"></div>
                <div class="theme-dot" style="background: #a855f7;" onclick="changeTheme('cyberpunk', this)" title="Ungu Cyberpunk"></div>
                <div class="theme-dot" style="background: #06b6d4;" onclick="changeTheme('aurora', this)" title="Biru Aurora"></div>
            </div>

            <h4>Gamertag MC</h4>
            <div class="gamertag-section">
                <div class="gamertag-item">
                    <span class="gamertag-label">JAVA EDITION</span>
                    <span class="gamertag-value">RexCraft</span>
                </div>
                <div class="gamertag-item">
                    <span class="gamertag-label">BEDROCK / MCPE</span>
                    <span class="gamertag-value">RexCraft6506</span>
                </div>
            </div>

        </div>
    </div>

    <div class="logo">🟢 RexCraft Mods</div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

<div class="watermark">⚡ RexCraft Web</div>

<script>
function toggleSettings() {
    document.getElementById('settingsDropdown').classList.toggle('show');
}

window.onclick = function(event) {
    if (!event.target.matches('.settings-btn')) {
        let dropdowns = document.getElementsByClassName("settings-dropdown");
        for (let i = 0; i < dropdowns.length; i++) {
            let openDropdown = dropdowns[i];
            if (openDropdown.classList.contains('show')) {
                openDropdown.classList.remove('show');
            }
        }
    }
}

function changeTheme(themeName, element) {
    if(themeName === 'default') {
        document.documentElement.removeAttribute('data-theme');
    } else {
        document.documentElement.setAttribute('data-theme', themeName);
    }
    
    let dots = document.querySelectorAll('.theme-dot');
    dots.forEach(dot => dot.classList.remove('active'));
    element.classList.add('active');
}
</script>

</body>
</html>
