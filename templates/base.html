<!DOCTYPE html>
<html>
<head>
<title>{{ title if title else 'RexCraft Web' }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:sans-serif;
background:
linear-gradient(135deg,#020617,#0f172a);
color:white;
min-height:100vh;
}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:rgba(15,23,42,0.8);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:24px;
font-weight:bold;
color:#22c55e;
}

.nav a{
text-decoration:none;
color:white;
margin-left:15px;
padding:10px 14px;
border-radius:12px;
transition:0.3s;
}

.nav a:hover{
background:#22c55e;
color:black;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.hero{
background:
linear-gradient(
135deg,
rgba(34,197,94,0.15),
rgba(255,255,255,0.03)
);

padding:60px 30px;
text-align:center;
border-radius:30px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero p{
color:#cbd5e1;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:rgba(15,23,42,0.8);
padding:20px;
border-radius:25px;
backdrop-filter:blur(10px);
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card:hover{
transform:translateY(-6px);
}

.card h2{
margin-bottom:10px;
color:#22c55e;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:999px;
background:#22c55e;
color:black;
font-size:13px;
font-weight:bold;
margin-bottom:12px;
}

.btn{
display:inline-block;
padding:12px 18px;
border-radius:14px;
background:linear-gradient(135deg,#22c55e,#16a34a);
text-decoration:none;
color:black;
font-weight:bold;
margin-top:15px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.04);
}

input,textarea{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:14px;
background:#111827;
color:white;
}

.watermark{
position:fixed;
bottom:10px;
right:15px;
color:rgba(255,255,255,0.15);
font-size:12px;
pointer-events:none;
}

@media(max-width:700px){

.hero h1{
font-size:34px;
}

.nav{
flex-direction:column;
gap:15px;
}

}

</style>
</head>
<body>

<div class="nav">

<div class="logo">
⛏️ Rauf Mods Hub
</div>

<div>
<a href="/">Home</a>
<a href="/upload">Upload</a>
</div>

</div>

<div class="container">
{% block content %}{% endblock %}
</div>

<div class="watermark">
⚡ Website Original RexCraft
</div>

</body>
</html>
