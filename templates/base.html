<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else 'RexCraft Mods' }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-color: #22c55e;
            --neon-glow: rgba(34, 197, 94, 0.25);
        }
        [data-theme="cyberpunk"] {
            --neon-color: #a855f7;
            --neon-glow: rgba(168, 85, 247, 0.25);
        }
        [data-theme="aurora"] {
            --neon-color: #06b6d4;
            --neon-glow: rgba(6, 182, 212, 0.25);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        body {
            background-color: #0b0f19;
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 60px;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #111827;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 999;
        }
        .logo {
            font-size: 16px;
            font-weight: 800;
            color: var(--neon-color);
            text-shadow: 0 0 8px var(--neon-glow);
        }
        .settings-container { position: relative; }
        .settings-btn {
            background: #1f2937;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
        }
        .settings-dropdown {
            display: none;
            position: absolute;
            top: 140%;
            left: 0;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 200px;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .settings-dropdown.show { display: block; }
        .settings-dropdown h4 {
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 6px;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .settings-dropdown h4:first-child { margin-top: 0; }
        .theme-options { display: flex; gap: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .theme-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .theme-dot.active { border-color: white; }
        .gamertag-section { display: flex; flex-direction: column; gap: 6px; padding-bottom: 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .gamertag-item { background: #1f2937; padding: 6px 8px; border-radius: 6px; font-size: 11px; }
        .gamertag-label { color: #64748b; font-size: 9px; display: block; font-weight: 600; }
        .gamertag-value { color: #e2e8f0; font-weight: 600; }
        
        .socmed-section { display: flex; flex-direction: column; gap: 5px; }
        .socmed-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 12px;
            background: rgba(255,255,255,0.02);
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .socmed-link:hover { background: #1f2937; color: var(--neon-color); }

        .container { max-width: 1200px; margin: auto; padding: 16px; }
        .hero-banner {
            position: relative; min-height: 180px; border-radius: 16px; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 20px; margin-bottom: 20px; background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('/static/img/banner.jpg'); background-size: cover; background-position: center; z-index: 1; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(11, 15, 25, 0.6) 0%, #0b0f19 100%); z-index: 2; }
        .hero-content { position: relative; z-index: 3; width: 100%; }
        .hero-content h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; color: #ffffff; }
        .hero-content p { color: #94a3b8; font-size: 13px; }
        .search-wrapper { position: relative; max-width: 100%; margin-top: 15px; }
        .search-input { width: 100%; padding: 12px 14px; background: #111827; border: 1px solid #1f2937; border-radius: 10px; color: white; font-size: 14px; outline: none; }
        .search-input:focus { border-color: var(--neon-color); }
        .filter-container { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; width: 100%; }
        .filter-container::-webkit-scrollbar { display: none; }
        .filter-btn { background: #111827; border: 1px solid #1f2937; padding: 10px 14px; border-radius: 10px; color: #cbd5e1; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
        .filter-btn.active { background: var(--neon-color); border-color: var(--neon-color); color: #0b0f19; box-shadow: 0 0 10px var(--neon-glow); }
        .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        @media(min-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } .hero-content h1 { font-size: 34px; } }
        @media(min-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        .card { background: #111827; border: 1px solid #1f2937; padding: 20px; border-radius: 14px; display: flex; flex-direction: column; justify-content: space-between; gap: 12px; }
        .card h2 { font-size: 18px; color: #ffffff; font-weight: 800; }
        .card p { color: #94a3b8; font-size: 13px; line-height: 1.5; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; background: #1f2937; color: #cbd5e1; font-size: 11px; font-weight: 600; border: 1px solid rgba(255,255,255,0.03); }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px; border-radius: 10px; background: var(--neon-color); text-decoration: none; color: #0b0f19; font-weight: 700; font-size: 13px; width: 100%; text-align: center; }
        .watermark { position: fixed; bottom: 10px; right: 10px; color: rgba(255, 255, 255, 0.1); font-size: 10px; background: #111827; padding: 4px 8px; border-radius: 4px; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

<div class="nav">
    <div class="settings-container">
        <button class="settings-btn" onclick="toggleSettings()">⚙️ Settings</button>
        <div class="settings-dropdown" id="settingsDropdown">
            
            <h4>Pilihan Tema</h4>
            <div class="theme-options">
                <div class="theme-dot active" style="background: #22c55e;" onclick="changeTheme('default', this)"></div>
                <div class="theme-dot" style="background: #a855f7;" onclick="changeTheme('cyberpunk', this)"></div>
                <div class="theme-dot" style="background: #06b6d4;" onclick="changeTheme('aurora', this)"></div>
            </div>

            <h4>Gamertag MC</h4>
            <div class="gamertag-section">
                <div class="gamertag-item">
                    <span class="gamertag-label">JAVA</span>
                    <span class="gamertag-value">RexCraft</span>
                </div>
                <div class="gamertag-item">
                    <span class="gamertag-label">BEDROCK / MCPE</span>
                    <span class="gamertag-value">RexCraft6506</span>
                </div>
            </div>

            <h4>Media Sosial</h4>
            <div class="socmed-section">
                <a href="https://tiktok.com/@rexx.6506" class="socmed-link" target="_blank">📱 TikTok</a>
                <a href="https://www.youtube.com/@RexRuinCraft" class="socmed-link" target="_blank">🎬 YouTube</a>
            </div>

        </div>
    </div>

    <div class="logo">🟢 RexCraft Mods</div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

<div class="watermark">⚡ RexCraft Web</div>

<script>
function toggleSettings() { document.getElementById('settingsDropdown').classList.toggle('show'); }
window.onclick = function(event) {
    if (!event.target.matches('.settings-btn')) {
        let dropdowns = document.getElementsByClassName("settings-dropdown");
        for (let i = 0; i < dropdowns.length; i++) {
            let openDropdown = dropdowns[i];
            if (openDropdown.classList.contains('show')) { openDropdown.classList.remove('show'); }
        }
    }
}
function changeTheme(themeName, element) {
    if(themeName === 'default') { document.documentElement.removeAttribute('data-theme'); } 
    else { document.documentElement.setAttribute('data-theme', themeName); }
    let dots = document.querySelectorAll('.theme-dot');
    dots.forEach(dot => dot.classList.remove('active'));
    element.classList.add('active');
}
</script>
</body>
</html>
