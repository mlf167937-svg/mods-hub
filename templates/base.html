<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RexCraft Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #111217;
            --bg-card: #1c1e26;
            --border: #2d313f;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --theme-color: #00af9c; /* Green Default */
        }
        body.theme-blue { --theme-color: #3b82f6; }
        body.theme-purple { --theme-color: #a855f7; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); }

        /* Navbar & Sidebar Setting (Pojok Kiri) */
        nav { padding: 15px 30px; background: var(--bg-card); border-bottom: 1px solid var(--border); display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .setting-btn { font-size: 24px; color: var(--theme-color); cursor: pointer; margin-right: 20px; background: none; border: none; }
        .brand { font-weight: 800; font-size: 20px; color: #fff; text-decoration: none; }
        .brand span { color: var(--theme-color); }

        .sidebar { position: fixed; top: 0; left: -350px; width: 350px; height: 100vh; background: var(--bg-card); border-right: 1px solid var(--border); transition: 0.3s; z-index: 1000; padding: 30px; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        
        .sb-title { font-size: 14px; color: var(--text-muted); font-weight: 800; margin: 20px 0 10px 0; text-transform: uppercase; }
        .theme-selector { display: flex; gap: 10px; }
        .t-btn { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .t-btn.green { background: #00af9c; } .t-btn.blue { background: #3b82f6; } .t-btn.purple { background: #a855f7; }
        
        .sb-link { display: block; color: var(--text-main); text-decoration: none; padding: 10px 0; font-weight: 600; border-bottom: 1px solid var(--border); }
        .sb-link i { width: 25px; color: var(--theme-color); }
        .sb-link:hover { color: var(--theme-color); }
        
        .gt-box { display: flex; justify-content: space-between; background: var(--bg-main); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
        .gt-box span { color: var(--text-muted); }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    </style>
</head>
<body class="theme-green">

    <nav>
        <button class="setting-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <a href="/" class="brand">RexCraft<span>Hub</span></a>
    </nav>

    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        <h2>Pengaturan</h2>
        
        <div class="sb-title">Tema Warna</div>
        <div class="theme-selector">
            <div class="t-btn green" onclick="setTheme('theme-green')"></div>
            <div class="t-btn blue" onclick="setTheme('theme-blue')"></div>
            <div class="t-btn purple" onclick="setTheme('theme-purple')"></div>
        </div>

        <div class="sb-title">Menu Utama</div>
        <a href="/ai" class="sb-link"><i class="fas fa-robot"></i> RexAI Q&A</a>
        <a href="/tutorial" class="sb-link"><i class="fas fa-book"></i> Tutorial Pemasangan</a>
        <a href="/upload" class="sb-link"><i class="fas fa-upload"></i> Upload Mod (Admin)</a>

        <div class="sb-title">Gamertag Minecraft</div>
        <div class="gt-box"><span>Java</span> <b>RexCraft</b></div>
        <div class="gt-box"><span>Bedrock</span> <b>RexCraft6506</b></div>

        <div class="sb-title">Media Sosial</div>
        <a href="https://youtube.com/" target="_blank" class="sb-link"><i class="fab fa-youtube" style="color: #ff0000;"></i> YouTube</a>
        <a href="https://tiktok.com/" target="_blank" class="sb-link"><i class="fab fa-tiktok" style="color: #fff;"></i> TikTok</a>

        <div class="sb-title">Donasi</div>
        <a href="#" class="sb-link" style="color: #f59e0b;"><i class="fas fa-tools"></i> Sedang dalam perbaikan</a>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function setTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('rexTheme', theme);
        }
        const savedTheme = localStorage.getItem('rexTheme');
        if(savedTheme) document.body.className = savedTheme;
    </script>
</body>
</html>
